{% extends "base.html" %}
{% block content %}
<div class="card card-body" style="margin-bottom: 14px">
  <strong>销售日报</strong>
  <div class="muted">汇总新增线索、可跟进客户、今日复访、优质来源和受阻来源。</div>
  <div class="actions" style="margin-top:10px">
    <form method="post" action="/report/send-wework" style="margin:0">
      <button class="{{ 'primary' if wework_enabled else '' }} btn btn-sm btn-outline-secondary" type="submit">推送企业微信</button>
    </form>
    {% if not wework_enabled %}
    <span class="muted">WEWORK_WEBHOOK_URL 未配置</span>
    {% endif %}
  </div>
  {% if send_result %}
  <div class="muted" style="margin-top:10px">{{ send_result }}</div>
  {% endif %}
</div>

<section class="card card-body">
  <pre class="content-box" style="margin:0; white-space:pre-wrap">{{ report }}</pre>
</section>
{% endblock %}
